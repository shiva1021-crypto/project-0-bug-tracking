{% extends "base.html" %}

{% block title %}Log in - BugTracker{% endblock %}
{% block body_class %}auth-page{% endblock %}

{% block content %}
<div class="auth-container">
    <section class="form-card compact panel">
        <h1>Log in to continue</h1>
        <form method="POST" novalidate style="margin-top: 16px;">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
            
            <div class="form-group">
                <label for="email">Email address</label>
                <input id="email" type="email" name="email" autocomplete="email" required placeholder="Enter email address">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" type="password" name="password" autocomplete="current-password" required placeholder="Enter password">
            </div>

            <button type="submit" style="width: 100%; min-height: 40px; margin-top: 12px;">Log in</button>
        </form>
        <p class="muted">New to BugTracker? <a href="{{ url_for('auth.register') }}">Sign up for an account</a></p>
    </section>
</div>
{% endblock %}
