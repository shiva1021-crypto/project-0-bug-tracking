{% extends "base.html" %}

{% block title %}Edit {{ bug.issue_key }} - Bug Tracking Tool{% endblock %}

{% block content %}
<section class="form-card">
    <h1>Edit {{ bug.issue_key }}</h1>
    <form method="POST" enctype="multipart/form-data" novalidate>
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <label for="title">Summary</label>
        <input id="title" type="text" name="title" maxlength="150" value="{{ bug.title }}" required>

        <label for="description">Description</label>
        <textarea id="description" name="description" required>{{ bug.description }}</textarea>

        <label for="reproduction_steps">Reproduction Steps</label>
        <textarea id="reproduction_steps" name="reproduction_steps">{{ bug.reproduction_steps or "" }}</textarea>

        <div class="two-column">
            <div>
                <label for="issue_type">Work Type</label>
                <select id="issue_type" name="issue_type" required>
                    {% for issue_type in issue_types %}
                        <option value="{{ issue_type }}" {% if bug.issue_type == issue_type %}selected{% endif %}>{{ issue_type }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="parent_id">Parent Issue</label>
                <select id="parent_id" name="parent_id">
                    <option value="">No parent</option>
                    {% for parent in parents %}
                        <option value="{{ parent.id }}" {% if bug.parent_id == parent.id %}selected{% endif %}>{{ parent.issue_key }} · {{ parent.title }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="two-column">
            <div>
                <label for="category">Category</label>
                <select id="category" name="category" required>
                    {% for category in categories %}
                        <option value="{{ category }}" {% if bug.category == category %}selected{% endif %}>{{ category }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="external_issue_url">External Issue URL</label>
                <input id="external_issue_url" type="url" name="external_issue_url" value="{{ bug.external_issue_url or '' }}" placeholder="https://github.com/...">
            </div>
        </div>

        <div class="two-column">
            <div>
                <label for="labels">Labels</label>
                <input id="labels" type="text" name="labels" maxlength="255" value="{{ bug.labels or '' }}">
            </div>
            <div>
                <label for="story_points">Story Points</label>
                <input id="story_points" type="number" name="story_points" min="1" max="100" value="{{ bug.story_points or '' }}">
            </div>
        </div>

        <label for="due_date">Due Date</label>
        <input id="due_date" type="date" name="due_date" value="{{ bug.due_date or '' }}">

        <div class="two-column">
            <div>
                <label for="priority">Priority</label>
                <select id="priority" name="priority" required>
                    {% for priority in priorities %}
                        <option value="{{ priority }}" {% if bug.priority == priority %}selected{% endif %}>{{ priority }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="severity">Severity</label>
                <select id="severity" name="severity" required>
                    {% for severity in severities %}
                        <option value="{{ severity }}" {% if bug.severity == severity %}selected{% endif %}>{{ severity }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <label for="screenshot">Replace Screenshot</label>
        <input id="screenshot" type="file" name="screenshot" accept="image/png,image/jpeg,image/gif,image/webp">

        <div class="action-row">
            <button type="submit">Save Changes</button>
            <a class="button button-secondary" href="{{ url_for('bug.bug_details', bug_id=bug.id) }}">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
