{% extends "base.html" %}

{% block title %}Create Issue — BugTracker{% endblock %}

{% block content %}
<div class="jira-main-content-narrow">
    <div class="page-heading" style="margin-bottom: 20px;">
        <div>
            <p class="eyebrow">Issue lifecycle</p>
            <h1>Create Issue</h1>
        </div>
    </div>

    <section class="panel form-card">
        <form method="POST" enctype="multipart/form-data" novalidate>
            <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
            
            <div class="two-column">
                <div class="form-group">
                    <label for="project_id">Project *</label>
                    <select id="project_id" name="project_id" required>
                        {% for project in projects %}
                            <option value="{{ project.id }}">{{ project.project_key }} · {{ project.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="issue_type">Issue Type *</label>
                    <select id="issue_type" name="issue_type" required>
                        {% for issue_type in issue_types %}
                            <option value="{{ issue_type }}" {% if issue_type == 'Bug' %}selected{% endif %}>{{ issue_type }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="title">Summary (Title) *</label>
                <input id="title" type="text" name="title" maxlength="150" required placeholder="Enter a brief, descriptive summary of the issue">
            </div>

            <div class="form-group">
                <label for="description">Description *</label>
                <textarea id="description" name="description" required placeholder="Provide a detailed description of the issue, acceptance criteria, or expected outcome..."></textarea>
            </div>

            <div class="form-group">
                <label for="reproduction_steps">Reproduction Steps</label>
                <textarea id="reproduction_steps" name="reproduction_steps" placeholder="List steps to reproduce, actual vs expected results..." style="min-height: 80px;"></textarea>
            </div>

            <div class="two-column">
                <div class="form-group">
                    <label for="category">Category *</label>
                    <select id="category" name="category" required>
                        {% for category in categories %}
                            <option value="{{ category }}">{{ category }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="external_issue_url">External Reference URL</label>
                    <input id="external_issue_url" type="url" name="external_issue_url" placeholder="e.g. https://github.com/org/repo/issues/1">
                </div>
            </div>

            <div class="two-column">
                <div class="form-group">
                    <label for="parent_id">Parent Issue</label>
                    <select id="parent_id" name="parent_id">
                        <option value="">No parent (Epic or Standalone)</option>
                        {% for parent in parents %}
                            <option value="{{ parent.id }}">{{ parent.issue_key }} · {{ parent.title }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="labels">Labels</label>
                    <input id="labels" type="text" name="labels" maxlength="255" placeholder="Comma-separated: frontend, backend, bug-fix">
                </div>
            </div>

            <div class="two-column">
                <div class="form-group">
                    <label for="story_points">Story Points (Estimate)</label>
                    <input id="story_points" type="number" name="story_points" min="1" max="100" placeholder="e.g. 1, 2, 3, 5, 8">
                </div>
                <div class="form-group">
                    <label for="due_date">Due Date</label>
                    <input id="due_date" type="date" name="due_date">
                </div>
            </div>

            <div class="two-column">
                <div class="form-group">
                    <label for="priority">Priority *</label>
                    <select id="priority" name="priority" required>
                        {% for priority in priorities %}
                            <option value="{{ priority }}">{{ priority }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="severity">Severity *</label>
                    <select id="severity" name="severity" required>
                        {% for severity in severities %}
                            <option value="{{ severity }}">{{ severity }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 24px;">
                <label for="screenshot">Upload Screenshot</label>
                <input id="screenshot" type="file" name="screenshot" accept="image/png,image/jpeg,image/gif,image/webp" style="padding-top: 6px;">
            </div>

            <div style="display: flex; gap: 8px; justify-content: flex-end; border-top: 1px solid var(--border); padding-top: 16px;">
                <a href="{{ url_for('project.board') }}" class="button button-secondary">Cancel</a>
                <button type="submit">Create Issue</button>
            </div>
        </form>
    </section>
</div>
{% endblock %}
